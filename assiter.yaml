server:
  host: "0.0.0.0"
  port: 8080

neo4j:
  uri: "bolt://localhost:7687"
  username: "neo4j"
  password: "password"
  database: "neo4j"

openai:
  api_key: ""           # Set via ASSITER_OPENAI__API_KEY env var
  base_url: "https://api.openai.com/v1"
  model: "gpt-4o"

parser:
  languages:
    - go
    - python
    - typescript
    - java
    - rust
    - cpp
  exclude:
    - vendor
    - node_modules
    - .git
    - dist
    - build
    - __pycache__
    - target
